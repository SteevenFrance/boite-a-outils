<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Tirage des Tables</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES THÈME ─────────────────────────────────────── */
:root {
  --bg:           #0D0D0D;
  --bg2:          #141414;
  --bg3:          #1A1A1A;
  --bg4:          #1E1E1E;
  --bg5:          #0D0D0D;
  --border:       rgba(255,255,255,.08);
  --border2:      rgba(255,255,255,.10);
  --text:         #F0EDE8;
  --text-muted:   rgba(240,237,232,.40);
  --text-faint:   rgba(240,237,232,.35);
  --grid-line:    rgba(255,255,255,.03);
  --drum-shadow:  0 0 50px rgba(254,202,87,.07), inset 0 0 30px rgba(0,0,0,.50);
  --card-flash:   #272714;
  --toggle-bg:    rgba(255,255,255,.06);
  --toggle-hover: rgba(255,255,255,.12);
  --stat-bg:      #1A1A1A;
  --input-bg:     #0D0D0D;
}
[data-theme="light"] {
  --bg:           #F4F1EC;
  --bg2:          #FFFFFF;
  --bg3:          #EEEAE3;
  --bg4:          #E5E1DA;
  --bg5:          #E9E5DE;
  --border:       rgba(0,0,0,.09);
  --border2:      rgba(0,0,0,.12);
  --text:         #1C1812;
  --text-muted:   rgba(28,24,18,.42);
  --text-faint:   rgba(28,24,18,.36);
  --grid-line:    rgba(0,0,0,.04);
  --drum-shadow:  0 0 50px rgba(254,202,87,.12), inset 0 0 20px rgba(0,0,0,.06);
  --card-flash:   #FFF8DC;
  --toggle-bg:    rgba(0,0,0,.06);
  --toggle-hover: rgba(0,0,0,.10);
  --stat-bg:      #FFFFFF;
  --input-bg:     #F4F1EC;
}

/* ── RESET ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; font-size: 16px; transition: background .3s; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; min-height: 100%;
  -webkit-font-smoothing: antialiased; transition: background .3s, color .3s;
}
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── THEME TOGGLE BUTTON ─────────────────────────────────── */
.share-btn {
  position: fixed; top: 14px; right: 64px; z-index: 100;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--text); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
  transition: transform .2s, box-shadow .2s, background .3s;
  touch-action: manipulation;
}
.share-btn:hover { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,0,0,.2); }
.share-btn:active { transform: scale(.95); }
.share-btn svg { width: 18px; height: 18px; }
.share-toast {
  position: fixed; bottom: 68px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg2); border: 1px solid rgba(254,202,87,.4);
  color: var(--text); padding: 12px 20px;
  border-radius: 10px; font-size: 14px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s; z-index: 201;
}
.share-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.theme-btn {
  position: fixed; top: 14px; right: 14px; z-index: 100;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--bg2); border: 1px solid var(--border2);
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
  transition: transform .2s, box-shadow .2s, background .3s, border-color .3s;
  touch-action: manipulation;
}
.theme-btn:hover  { transform: scale(1.1); box-shadow: 0 4px 20px rgba(0,0,0,.2); }
.theme-btn:active { transform: scale(.95); }

/* ── BG GRID ─────────────────────────────────────────────── */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 40px 40px; transition: opacity .3s;
}

/* ── SCREENS ─────────────────────────────────────────────── */
.screen { display: none; position: relative; z-index: 1; }
.screen.active { display: flex; }

/* ══ CONFIG ══════════════════════════════════════════════ */
#s-config {
  flex-direction: column; align-items: center; justify-content: center;
  min-height: 100dvh; padding: clamp(48px,6vw,72px) clamp(16px,5vw,32px) clamp(24px,4vw,48px);
}
.cfg-title {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(40px,9vw,86px);
  letter-spacing: .06em; text-align: center; line-height: 1;
  background: linear-gradient(135deg,#FECA57,#FF6B6B);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px;
}
.cfg-sub {
  font-size: clamp(10px,2vw,13px); letter-spacing: .2em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: clamp(20px,4vw,40px); text-align: center;
}
.cfg-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: clamp(18px,4vw,32px);
  width: 100%; max-width: 460px; display: flex; flex-direction: column;
  gap: clamp(16px,3vw,24px); box-shadow: 0 4px 32px rgba(0,0,0,.15);
  transition: background .3s, border-color .3s;
}

/* ── Mode toggle ── */
.mode-toggle {
  display: flex; background: var(--bg5); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px; gap: 4px; transition: background .3s;
}
.mode-btn {
  flex: 1; padding: clamp(9px,2vw,13px) 8px; border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: clamp(11px,2.2vw,13px); font-weight: 500;
  cursor: pointer; transition: all .2s; color: var(--text-muted);
  background: transparent; text-align: center; touch-action: manipulation; line-height: 1.3;
}
.mode-btn.active {
  background: var(--bg4); color: var(--text);
  box-shadow: 0 2px 8px rgba(0,0,0,.18);
}
.mode-btn.active .mode-icon { color: #FECA57; }
.mode-icon { display: block; font-size: clamp(16px,3.5vw,20px); margin-bottom: 3px; }

/* ── Separator ── */
.cfg-sep { height: 1px; background: var(--border); margin: 2px 0; }

/* ── Fields ── */
.cfg-field { display: flex; flex-direction: column; gap: 8px; }
.cfg-lbl {
  font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-muted);
}
.cfg-row { display: flex; align-items: center; gap: 10px; }
.cfg-input {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(28px,6vw,36px); text-align: center; padding: 9px 6px; outline: none;
  width: 100%; transition: border-color .2s, background .3s, color .3s;
}
.cfg-input:focus { border-color: rgba(254,202,87,.55); }
.cfg-stepper {
  background: var(--toggle-bg); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-size: clamp(18px,4vw,24px);
  min-width: clamp(42px,9vw,52px); height: clamp(48px,10vw,58px);
  cursor: pointer; transition: background .15s, color .3s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; touch-action: manipulation;
}
.cfg-stepper:hover  { background: var(--toggle-hover); }
.cfg-stepper:active { opacity: .7; }

/* ── Hint ── */
.cfg-hint {
  font-size: clamp(12px,2.5vw,14px); text-align: center; padding: 11px 16px;
  border-radius: 8px; transition: all .2s; min-height: 44px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.cfg-hint.ok   { background: rgba(254,202,87,.1);  color: #D4A017; }
.cfg-hint.err  { background: rgba(255,107,107,.1); color: #E05555; }
.cfg-hint.info { background: rgba(72,219,251,.1);  color: #2E9BB8; }
[data-theme="dark"] .cfg-hint.ok   { color: #FECA57; }
[data-theme="dark"] .cfg-hint.err  { color: #FF6B6B; }
[data-theme="dark"] .cfg-hint.info { color: #48DBFB; }

/* ── Custom cap grid ── */
.cap-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 8px;
  max-height: 260px; overflow-y: auto; padding: 2px;
}
.cap-item {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 8px; transition: border-color .2s, background .3s;
}
.cap-item:focus-within { border-color: rgba(254,202,87,.45); }
.cap-item-head { display: flex; align-items: center; gap: 5px; }
.cap-item-lbl  { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }
.cap-item-color { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.cap-item-row  { display: flex; align-items: center; gap: 5px; width: 100%; }
.cap-step {
  background: var(--toggle-bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-size: 15px;
  width: 28px; height: 28px; flex-shrink: 0;
  cursor: pointer; transition: background .15s;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; line-height: 1;
}
.cap-step:hover  { background: var(--toggle-hover); }
.cap-step:active { opacity: .7; }
.cap-item-input {
  background: transparent; border: none; outline: none; color: var(--text);
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; text-align: center;
  width: 100%; min-width: 0; transition: color .3s;
}

.btn-start {
  width: 100%; padding: clamp(14px,3vw,18px); border: none; border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(20px,4.5vw,26px); letter-spacing: .14em;
  cursor: pointer; transition: transform .15s, box-shadow .15s;
  background: linear-gradient(135deg,#FECA57,#FF9F43); color: #0D0D0D;
  touch-action: manipulation;
}
.btn-start:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 8px 32px rgba(254,202,87,.28); }
.btn-start:active:not(:disabled) { transform: scale(.98); }
.btn-start:disabled { opacity: .3; cursor: not-allowed; }

/* ══ DRAW ════════════════════════════════════════════════ */
#s-draw {
  flex-direction: column; align-items: center;
  padding: clamp(18px,4vw,40px) clamp(12px,4vw,24px) clamp(36px,7vw,64px);
  min-height: 100dvh;
}
.draw-title {
  font-family: 'Bebas Neue', sans-serif; font-size: clamp(32px,7vw,70px);
  letter-spacing: .06em; text-align: center; line-height: 1;
  background: linear-gradient(135deg,#FECA57,#FF6B6B);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px;
}
.draw-sub {
  font-size: clamp(10px,2vw,13px); letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: clamp(20px,4.5vw,38px); text-align: center;
}

/* DRUM */
.drum-wrap {
  position: relative; width: clamp(150px,36vw,210px); height: clamp(150px,36vw,210px);
  margin-bottom: clamp(28px,6vw,48px); flex-shrink: 0;
}
.drum-ring { position:absolute; inset:0; border-radius:50%; border:3px solid rgba(254,202,87,.18); animation:pulse-ring 2s ease-in-out infinite; }
.drum-ring-2 { inset:8px; border-color:rgba(255,107,107,.12); animation-delay:.5s; }
@keyframes pulse-ring { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.05);opacity:.5} }
.drum-face {
  position:absolute; inset:16px; border-radius:50%; background: var(--bg3);
  border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:4px;
  box-shadow: var(--drum-shadow); transition:border-color .35s, background .3s;
}
.drum-face.spin { animation:shake .09s linear infinite; }
@keyframes shake {
  0%,100%{transform:translateX(0) rotate(0deg)}
  25%{transform:translateX(-3px) rotate(-1.5deg)}
  75%{transform:translateX(3px) rotate(1.5deg)}
}
.drum-num  { font-family:'Bebas Neue',sans-serif; font-size:clamp(50px,14vw,76px); line-height:1; transition:color .05s; }
.drum-lbl  { font-size:clamp(9px,2vw,11px); letter-spacing:.25em; text-transform:uppercase; color:var(--text-muted); }
.result-badge {
  position:absolute; bottom:-14px; left:50%; transform:translateX(-50%);
  padding:6px 18px; border-radius:20px; font-size:clamp(11px,2.5vw,13px); font-weight:700;
  letter-spacing:.05em; white-space:nowrap;
  animation:pop-in .4s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes pop-in { from{transform:translateX(-50%) scale(.6);opacity:0} to{transform:translateX(-50%) scale(1);opacity:1} }

/* DRAW BUTTON */
.btn-draw {
  padding:clamp(13px,3vw,17px) clamp(32px,7vw,56px); border:none; border-radius:6px;
  font-family:'Bebas Neue',sans-serif; font-size:clamp(20px,4.5vw,26px); letter-spacing:.14em;
  cursor:pointer; transition:transform .15s, box-shadow .15s;
  position:relative; overflow:hidden; margin-bottom:clamp(20px,4.5vw,36px); flex-shrink:0;
  touch-action:manipulation;
}
.btn-draw::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#FECA57,#FF9F43);}
.btn-draw::after{content:'';position:absolute;inset:2px;background:var(--bg);border-radius:4px;transition:background .3s;}
.btn-draw span{position:relative;z-index:1;background:linear-gradient(135deg,#FECA57,#FF9F43);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.btn-draw:hover:not(:disabled){transform:scale(1.04);box-shadow:0 8px 32px rgba(254,202,87,.28);}
.btn-draw:active:not(:disabled){transform:scale(.97);}
.btn-draw:disabled{opacity:.3;cursor:not-allowed;}

/* STATS */
.stats-row{display:flex;gap:clamp(8px,2vw,16px);margin-bottom:clamp(14px,3.5vw,26px);flex-wrap:wrap;justify-content:center;}
.stat-pill{
  background:var(--stat-bg);border:1px solid var(--border);border-radius:40px;
  padding:clamp(6px,1.5vw,9px) clamp(12px,2.5vw,20px);display:flex;align-items:center;gap:6px;
  transition:background .3s,border-color .3s;
}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,4vw,23px);line-height:1;}
.stat-lbl{color:var(--text-muted);font-size:clamp(10px,2vw,12px);}

/* TABLES GRID */
.tables-grid{display:grid;gap:clamp(6px,1.5vw,10px);width:100%;max-width:560px;margin-bottom:clamp(14px,3.5vw,26px);}
.t-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:clamp(8px,2vw,12px) clamp(6px,1.5vw,10px);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  transition:border-color .3s, background .3s;position:relative;overflow:hidden;
}
.t-card.full{opacity:.3;}
.t-card.flash{animation:flash-card .6s ease;}
@keyframes flash-card{0%,100%{background:var(--bg2)}50%{background:var(--card-flash)}}
.t-id{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,4.5vw,27px);line-height:1;}
.t-prog-bg{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.t-prog-fill{height:100%;border-radius:2px;transition:width .55s cubic-bezier(.34,1.56,.64,1);}
.t-seats{font-size:clamp(10px,2vw,12px);color:var(--text-muted);}
.t-full-badge{
  position:absolute;top:5px;right:5px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;
  background:var(--border);padding:2px 5px;border-radius:3px;color:var(--text-muted);
}

/* UNDO TOAST */
.undo-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--bg2); border: 1px solid rgba(255,107,107,.4); border-radius: 10px;
  padding: 10px 20px; font-size: 13px; color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,.25); z-index: 200;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
  opacity: 0; pointer-events: none; white-space: nowrap;
}
.undo-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* COMPLETE */
.complete-msg{
  text-align:center;padding:clamp(14px,3vw,22px);
  background:linear-gradient(135deg,rgba(30,215,99,.08),rgba(254,202,87,.08));
  border:1px solid rgba(30,215,99,.2);border-radius:14px;max-width:340px;
  margin-bottom:clamp(12px,3vw,20px);
}
.complete-msg .icon{font-size:clamp(26px,6vw,36px);margin-bottom:6px;}
.complete-msg h3{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,5vw,28px);letter-spacing:.1em;color:#1DD1A1;}
.complete-msg p{font-size:clamp(11px,2.5vw,13px);color:var(--text-muted);margin-top:5px;}

/* ACTIONS */
.actions-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.btn-sec{
  padding:clamp(8px,2vw,11px) clamp(12px,2.8vw,20px);
  background:transparent;border:1px solid var(--border2);border-radius:6px;
  color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:clamp(11px,2.3vw,13px);
  cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.btn-sec:hover{border-color:var(--text-faint);color:var(--text);}
.btn-sec:disabled{opacity:.3;cursor:not-allowed;}
.btn-danger{border-color:rgba(255,107,107,.3);color:rgba(255,107,107,.7);}
.btn-danger:hover{border-color:#FF6B6B;color:#FF6B6B;}
.btn-undo{border-color:rgba(254,202,87,.3);color:rgba(254,202,87,.7);}
.btn-undo:hover:not(:disabled){border-color:#FECA57;color:#FECA57;}

/* HISTORY */
.hist-panel{
  width:100%;max-width:560px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;margin-top:12px;overflow:hidden;transition:background .3s;
}
.hist-hdr{
  padding:10px 16px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-muted);border-bottom:1px solid var(--border);
}
.hist-list{max-height:200px;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:3px;}
.hist-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-radius:5px;background:rgba(128,128,128,.04);
  font-size:clamp(11px,2.5vw,13px);
}
.hist-num{color:var(--text-muted);font-size:11px;}

/* PARTICLES */
.particle{position:fixed;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:999;transition:transform 1s ease-out,opacity 1s ease-out;}

/* RESPONSIVE */
@media (min-height:700px) { .cap-grid { max-height: 300px; } }
@media (max-height:680px) and (max-width:480px) {
  .drum-wrap{width:130px;height:130px;margin-bottom:20px;}
  .btn-draw{margin-bottom:14px;}
  .stats-row{margin-bottom:12px;}
  #s-draw{padding-top:12px;}
}
</style>
</head>
<body>

<!-- Share button -->
<button class="share-btn" id="share-btn" aria-label="Partager">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
</button>
<div class="share-toast" id="share-toast">Lien copié !</div>

<!-- Theme toggle (global, always visible) -->
<button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Changer de thème">🌙</button>

<div class="bg-grid"></div>

<!-- Toast undo -->
<div class="undo-toast" id="undo-toast"></div>

<!-- ══ CONFIG ══════════════════════════════════════════════ -->
<div id="s-config" class="screen active">
  <h1 class="cfg-title">Tirage des Tables</h1>
  <p class="cfg-sub">Configurez votre événement</p>

  <div class="cfg-box">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-mode-auto"   onclick="setMode('auto')"   aria-pressed="true">
        <span class="mode-icon">👥</span><span class="mode-label">Participants<br>→ Tables</span>
      </button>
      <button class="mode-btn"        id="btn-mode-equal"  onclick="setMode('equal')"  aria-pressed="false">
        <span class="mode-icon">🪑</span><span class="mode-label">Places égales<br>par table</span>
      </button>
      <button class="mode-btn"        id="btn-mode-custom" onclick="setMode('custom')" aria-pressed="false">
        <span class="mode-icon">✏️</span><span class="mode-label">Places<br>personnalisées</span>
      </button>
    </div>

    <div class="cfg-sep"></div>

    <!-- AUTO -->
    <div id="block-auto">
      <div class="cfg-field" style="margin-bottom:clamp(14px,3vw,20px)">
        <label class="cfg-lbl">Nombre de participants</label>
        <div class="cfg-row">
          <button class="cfg-stepper" onclick="adj('people',-1)">−</button>
          <input class="cfg-input" id="inp-people" type="number" value="65" min="2" max="500" inputmode="numeric" oninput="syncHint()">
          <button class="cfg-stepper" onclick="adj('people',1)">+</button>
        </div>
      </div>
      <div class="cfg-field">
        <label class="cfg-lbl">Nombre de tables</label>
        <div class="cfg-row">
          <button class="cfg-stepper" onclick="adj('tables-auto',-1)">−</button>
          <input class="cfg-input" id="inp-tables-auto" type="number" value="9" min="2" max="30" inputmode="numeric" oninput="syncHint()">
          <button class="cfg-stepper" onclick="adj('tables-auto',1)">+</button>
        </div>
      </div>
    </div>

    <!-- EQUAL -->
    <div id="block-equal" style="display:none">
      <div class="cfg-field" style="margin-bottom:clamp(14px,3vw,20px)">
        <label class="cfg-lbl">Nombre de tables</label>
        <div class="cfg-row">
          <button class="cfg-stepper" onclick="adj('tables-eq',-1)">−</button>
          <input class="cfg-input" id="inp-tables-eq" type="number" value="9" min="2" max="30" inputmode="numeric" oninput="syncHint()">
          <button class="cfg-stepper" onclick="adj('tables-eq',1)">+</button>
        </div>
      </div>
      <div class="cfg-field">
        <label class="cfg-lbl">Places par table</label>
        <div class="cfg-row">
          <button class="cfg-stepper" onclick="adj('seats-eq',-1)">−</button>
          <input class="cfg-input" id="inp-seats-eq" type="number" value="7" min="1" max="200" inputmode="numeric" oninput="syncHint()">
          <button class="cfg-stepper" onclick="adj('seats-eq',1)">+</button>
        </div>
      </div>
    </div>

    <!-- CUSTOM -->
    <div id="block-custom" style="display:none">
      <div class="cfg-field" style="margin-bottom:clamp(14px,3vw,20px)">
        <label class="cfg-lbl">Nombre de tables</label>
        <div class="cfg-row">
          <button class="cfg-stepper" onclick="adj('tables-cu',-1)">−</button>
          <input class="cfg-input" id="inp-tables-cu" type="number" value="9" min="2" max="30" inputmode="numeric" oninput="rebuildCustomGrid()">
          <button class="cfg-stepper" onclick="adj('tables-cu',1)">+</button>
        </div>
      </div>
      <div class="cfg-field">
        <label class="cfg-lbl">Places par table (modifiables)</label>
        <div class="cap-grid" id="cap-grid"></div>
      </div>
    </div>

    <div id="cfg-hint" class="cfg-hint ok"></div>
    <button class="btn-start" id="btn-start" onclick="startDraw()">🎲 Lancer le tirage</button>
  </div>
</div>

<!-- ══ DRAW ════════════════════════════════════════════════ -->
<div id="s-draw" class="screen">
  <h1 class="draw-title">Tirage des Tables</h1>
  <p class="draw-sub" id="draw-sub"></p>

  <div class="drum-wrap">
    <div class="drum-ring"></div>
    <div class="drum-ring drum-ring-2"></div>
    <div class="drum-face" id="drum">
      <div class="drum-num" id="drum-num">?</div>
      <div class="drum-lbl" id="drum-lbl">Table</div>
    </div>
    <div class="result-badge" id="rbadge" style="display:none"></div>
  </div>

  <button class="btn-draw" id="btn-draw" onclick="doDraw()">
    <span id="btn-txt">🎲 Tirer ma table</span>
  </button>

  <div class="stats-row">
    <div class="stat-pill"><span class="stat-val" id="s-placed" style="color:#FECA57">0</span><span class="stat-lbl">placés</span></div>
    <div class="stat-pill"><span class="stat-val" id="s-remain" style="color:#48DBFB">0</span><span class="stat-lbl">restants</span></div>
    <div class="stat-pill"><span class="stat-val" id="s-active" style="color:#1DD1A1">0</span><span class="stat-lbl">tables actives</span></div>
  </div>

  <div class="tables-grid" id="tgrid"></div>

  <div class="complete-msg" id="complete" style="display:none">
    <div class="icon">🎉</div>
    <h3>Placement terminé !</h3>
    <p id="complete-txt"></p>
  </div>

  <div class="actions-row">
    <button class="btn-sec btn-undo" id="btn-undo" onclick="undoLast()" disabled>↩︎ Annuler</button>
    <button class="btn-sec" onclick="toggleHist()">Historique (<span id="hcnt">0</span>)</button>
    <button class="btn-sec" onclick="goConfig()">⚙️ Reconfigurer</button>
    <button class="btn-sec btn-danger" id="btn-reset" onclick="doReset()">Recommencer</button>
  </div>

  <div class="hist-panel" id="hist-panel" style="display:none">
    <div class="hist-hdr">Historique du tirage</div>
    <div class="hist-list" id="hist-list"></div>
  </div>
</div>

<script>
/* ── PALETTE ─────────────────────────────────────────────── */
const COLORS = ["#FF6B6B","#FF9F43","#FECA57","#48DBFB","#1DD1A1","#B2BABB","#FF9FF3","#A29BFE","#FD79A8","#54A0FF","#C39BD3","#00D2D3","#F8B739","#26de81","#fd9644","#4bcffa","#a55eea","#45aaf2","#fed330","#fc5c65"];
const EMOJIS = ["🔴","🟠","🟡","🔵","🟢","⚪","🩷","🟣","🌸","🔷","💜","🩵","🟤","🟩","🟧","🫧","🔮","💎","⭐","❤️"];

/* ── STATE ───────────────────────────────────────────────── */
let currentMode = 'auto';
let tables = [], totalCapacity = 0, history = [];
let spinning = false, flashId = null, resetStep = 0;
let showHist = false, spinTimer = null;
let isDark = true;
let toastTimer = null;

/* ── THEME ───────────────────────────────────────────────── */
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = isDark ? '🌙' : '☀️';
  // Save preference
  try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}
}
// Restore saved preference
try {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') { isDark = false; document.documentElement.setAttribute('data-theme','light'); document.getElementById('theme-btn').textContent = '☀️'; }
} catch(e){}

/* ── MODE ────────────────────────────────────────────────── */
function setMode(m) {
  currentMode = m;
  ['auto','equal','custom'].forEach(x => {
    document.getElementById('block-'+x).style.display = x===m ? 'block' : 'none';
    const btn = document.getElementById('btn-mode-'+x);
    btn.classList.toggle('active', x===m);
    btn.setAttribute('aria-pressed', String(x===m));
  });
  if (m === 'custom') rebuildCustomGrid();
  syncHint();
}

/* ── CUSTOM GRID ─────────────────────────────────────────── */
function rebuildCustomGrid() {
  const nt = parseInt(document.getElementById('inp-tables-cu').value) || 0;
  const grid = document.getElementById('cap-grid');
  const existing = Array.from(grid.querySelectorAll('.cap-item-input')).map(i => parseInt(i.value)||7);
  grid.innerHTML = '';
  for (let i=0; i<nt; i++) {
    const val   = existing[i] !== undefined ? existing[i] : 7;
    const color = COLORS[i % COLORS.length];
    const emoji = EMOJIS[i % EMOJIS.length];
    const div   = document.createElement('div');
    div.className = 'cap-item';
    div.style.borderColor = color + '30';
    div.innerHTML = `
      <div class="cap-item-head">
        <div class="cap-item-color" style="background:${color}"></div>
        <span class="cap-item-lbl">${emoji} Table ${i+1}</span>
      </div>
      <div class="cap-item-row">
        <button class="cap-step" onclick="adjCustom(${i},-1)">−</button>
        <input class="cap-item-input" id="cap-inp-${i}" type="number" value="${val}" min="1" max="200" inputmode="numeric" oninput="syncHint()">
        <button class="cap-step" onclick="adjCustom(${i},1)">+</button>
      </div>`;
    grid.appendChild(div);
  }
  syncHint();
}
function adjCustom(i, d) {
  const inp = document.getElementById('cap-inp-'+i);
  if (!inp) return;
  inp.value = Math.min(200, Math.max(1, (parseInt(inp.value)||1) + d));
  syncHint();
}

/* ── STEPPERS ────────────────────────────────────────────── */
function adj(field, d) {
  const map = {
    'people':     {id:'inp-people',     min:2,  max:500, cb:syncHint},
    'tables-auto':{id:'inp-tables-auto',min:2,  max:30,  cb:syncHint},
    'tables-eq':  {id:'inp-tables-eq',  min:2,  max:30,  cb:syncHint},
    'seats-eq':   {id:'inp-seats-eq',   min:1,  max:200, cb:syncHint},
    'tables-cu':  {id:'inp-tables-cu',  min:2,  max:30,  cb:rebuildCustomGrid},
  };
  const cfg = map[field]; if (!cfg) return;
  const el = document.getElementById(cfg.id);
  el.value = Math.min(cfg.max, Math.max(cfg.min, (parseInt(el.value)||0) + d));
  cfg.cb();
}
function getInt(id, fb=0) { return parseInt(document.getElementById(id).value)||fb; }

/* ── HINT ────────────────────────────────────────────────── */
function syncHint() {
  const hint = document.getElementById('cfg-hint');
  const btn  = document.getElementById('btn-start');
  let ok=true, text='', cls='ok';
  if (currentMode === 'auto') {
    const p=getInt('inp-people'), t=getInt('inp-tables-auto');
    if (!p||!t||p<t){ok=false;text='⚠️ Plus de tables que de participants';cls='err';}
    else {
      const base=Math.floor(p/t),ex=p%t;
      text=ex===0?`${t} tables de ${base} places · ${p} participants`
        :`${ex} table${ex>1?'s':''} de ${base+1} · ${t-ex} table${t-ex>1?'s':''} de ${base} · ${p} participants`;
    }
  } else if (currentMode === 'equal') {
    const t=getInt('inp-tables-eq'),s=getInt('inp-seats-eq');
    if(!t||!s){ok=false;text='⚠️ Valeurs invalides';cls='err';}
    else{text=`${t} tables × ${s} places = ${t*s} places au total`;cls='info';}
  } else {
    const inputs=Array.from(document.querySelectorAll('.cap-item-input'));
    if(!inputs.length){ok=false;text='Configurez les tables';cls='err';}
    else{
      const vals=inputs.map(i=>parseInt(i.value)||0);
      if(vals.some(v=>v<1)){ok=false;text='⚠️ Chaque table doit avoir au moins 1 place';cls='err';}
      else{
        const total=vals.reduce((a,b)=>a+b,0),min=Math.min(...vals),max=Math.max(...vals);
        text=min===max?`${vals.length} tables de ${min} places · ${total} places au total`
          :`${vals.length} tables · de ${min} à ${max} places · ${total} total`;
        cls='info';
      }
    }
  }
  hint.textContent=text; hint.className=`cfg-hint ${cls}`; btn.disabled=!ok;
}

/* ── BUILD TABLES ────────────────────────────────────────── */
function buildTablesAuto(p,t){
  const base=Math.floor(p/t),ex=p%t;
  return Array.from({length:t},(_,i)=>({id:i+1,max:i<ex?base+1:base,assigned:0,color:COLORS[i%COLORS.length],emoji:EMOJIS[i%EMOJIS.length]}));
}
function buildTablesEqual(t,s){
  return Array.from({length:t},(_,i)=>({id:i+1,max:s,assigned:0,color:COLORS[i%COLORS.length],emoji:EMOJIS[i%EMOJIS.length]}));
}
function buildTablesCustom(){
  return Array.from(document.querySelectorAll('.cap-item-input'),
    (inp,i)=>({id:i+1,max:parseInt(inp.value)||7,assigned:0,color:COLORS[i%COLORS.length],emoji:EMOJIS[i%EMOJIS.length]}));
}

/* ── START ───────────────────────────────────────────────── */
function startDraw(){
  if(currentMode==='auto')       tables=buildTablesAuto(getInt('inp-people'),getInt('inp-tables-auto'));
  else if(currentMode==='equal') tables=buildTablesEqual(getInt('inp-tables-eq'),getInt('inp-seats-eq'));
  else                           tables=buildTablesCustom();
  totalCapacity=tables.reduce((s,t)=>s+t.max,0);
  history=[]; spinning=false; flashId=null; resetStep=0;
  clearTimeout(resetTimer); resetTimer=null;
  const nt=tables.length;
  document.getElementById('draw-sub').textContent=
    currentMode==='auto'?`${totalCapacity} participants · ${nt} tables`:
    currentMode==='equal'?`${nt} tables · ${tables[0].max} places chacune · ${totalCapacity} places`:
    `${nt} tables · ${totalCapacity} places au total`;
  document.getElementById('s-config').classList.remove('active');
  document.getElementById('s-draw').classList.add('active');
  const g=document.getElementById('tgrid');
  const cols=nt<=4?2:nt<=9?3:nt<=16?4:5;
  g.style.gridTemplateColumns=`repeat(${Math.min(cols,nt)},1fr)`;
  showHist=false; document.getElementById('hist-panel').style.display='none';
  resetDrum(); renderTables(); updateStats(); renderHist(); updateUndoBtn();
}
function goConfig(){
  // Stopper un tirage en cours si l'utilisateur quitte l'écran
  if(spinTimer){ clearInterval(spinTimer); spinTimer=null; }
  spinning=false;
  // Annuler le timer de confirmation reset
  clearTimeout(resetTimer); resetTimer=null; resetStep=0;
  document.getElementById('btn-reset').textContent='Recommencer';
  // Réactiver le bouton de tirage au cas où il était désactivé
  document.getElementById('btn-draw').disabled=false;
  document.getElementById('btn-txt').textContent='🎲 Tirer ma table';
  document.getElementById('s-draw').classList.remove('active');
  document.getElementById('s-config').classList.add('active');
  syncHint();
}

/* ── DRAW ────────────────────────────────────────────────── */
function doDraw(){
  if(spinning) return;
  const avail=tables.filter(t=>t.assigned<t.max);
  if(!avail.length) return;
  spinning=true;
  document.getElementById('rbadge').style.display='none';
  document.getElementById('drum').classList.add('spin');
  document.getElementById('drum-lbl').textContent='Tirage…';
  document.getElementById('btn-draw').disabled=true;
  document.getElementById('btn-txt').textContent='⏳ En cours…';
  document.getElementById('btn-undo').disabled=true;

  const pool=[];
  avail.forEach(t=>{for(let i=0;i<t.max-t.assigned;i++)pool.push(t.id);});
  const pickedId=pool[Math.floor(Math.random()*pool.length)];
  const picked=tables.find(t=>t.id===pickedId);

  let count=0,max=22;
  spinTimer=setInterval(()=>{
    const r=tables[Math.floor(Math.random()*tables.length)];
    document.getElementById('drum-num').textContent=r.id;
    document.getElementById('drum-num').style.color=r.color;
    if(++count>=max){
      clearInterval(spinTimer);
      document.getElementById('drum-num').textContent=pickedId;
      document.getElementById('drum-num').style.color=picked.color;
      document.getElementById('drum').classList.remove('spin');
      document.getElementById('drum').style.borderColor=picked.color+'55';
      document.getElementById('drum-lbl').textContent='Table';
      tables=tables.map(t=>t.id===pickedId?{...t,assigned:t.assigned+1}:t);
      const placed=totalCapacity-tables.reduce((s,t)=>s+(t.max-t.assigned),0);
      history.unshift({table:picked,num:placed});
      flashId=pickedId;
      const updated=tables.find(t=>t.id===pickedId);
      const badge=document.getElementById('rbadge');
      badge.textContent=`${picked.emoji} Table ${pickedId} — ${updated.assigned}/${updated.max}`;
      badge.style.cssText=`display:block;background:${picked.color}1A;color:${picked.color};border:1px solid ${picked.color}44`;
      spawnParticles(picked.color);
      renderTables(); updateStats(); renderHist();
      spinning=false;
      updateUndoBtn();
      const remaining=tables.reduce((s,t)=>s+(t.max-t.assigned),0);
      if(remaining===0){
        document.getElementById('btn-draw').disabled=true;
        document.getElementById('btn-txt').textContent='✅ Complet !';
        document.getElementById('complete').style.display='block';
        document.getElementById('complete-txt').textContent=`Les ${totalCapacity} places ont été attribuées sur ${tables.length} tables.`;
      } else {
        document.getElementById('btn-draw').disabled=false;
        document.getElementById('btn-txt').textContent='🎲 Tirer ma table';
      }
      setTimeout(()=>{flashId=null;renderTables();},700);
    }
  },72);
}

/* ── UNDO ────────────────────────────────────────────────── */
function undoLast(){
  if(spinning||history.length===0) return;
  const last=history.shift();
  tables=tables.map(t=>t.id===last.table.id?{...t,assigned:Math.max(0,t.assigned-1)}:t);

  // Mettre à jour le tambour
  if(history.length>0){
    const prev=history[0];
    document.getElementById('drum-num').textContent=prev.table.id;
    document.getElementById('drum-num').style.color=prev.table.color;
    document.getElementById('drum').style.borderColor=prev.table.color+'55';
    document.getElementById('drum-lbl').textContent='Table';
    const prevT=tables.find(t=>t.id===prev.table.id);
    const badge=document.getElementById('rbadge');
    badge.textContent=`${prev.table.emoji} Table ${prev.table.id} — ${prevT.assigned}/${prevT.max}`;
    badge.style.cssText=`display:block;background:${prev.table.color}1A;color:${prev.table.color};border:1px solid ${prev.table.color}44`;
  } else {
    resetDrum();
  }

  // Cacher le message "complet"
  document.getElementById('complete').style.display='none';
  document.getElementById('btn-draw').disabled=false;
  document.getElementById('btn-txt').textContent='🎲 Tirer ma table';

  renderTables(); updateStats(); renderHist(); updateUndoBtn();

  // Toast
  showToast(`↩︎ Tirage annulé · ${last.table.emoji} Table ${last.table.id}`);
}

function updateUndoBtn(){
  document.getElementById('btn-undo').disabled=(history.length===0||spinning);
}

function showToast(msg){
  const t=document.getElementById('undo-toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ── RESET ───────────────────────────────────────────────── */
let resetTimer = null;
function doReset(){
  const btn=document.getElementById('btn-reset');
  if(resetStep===0){
    resetStep=1; btn.textContent='⚠️ Confirmer ?';
    resetTimer=setTimeout(()=>{resetStep=0;btn.textContent='Recommencer';},3000);
  } else {
    clearTimeout(resetTimer); resetTimer=null;
    resetStep=0; btn.textContent='Recommencer';
    tables=tables.map(t=>({...t,assigned:0}));
    history=[]; flashId=null;
    resetDrum(); renderTables(); updateStats(); renderHist(); updateUndoBtn();
    document.getElementById('complete').style.display='none';
    showHist=false; document.getElementById('hist-panel').style.display='none';
  }
}
function resetDrum(){
  document.getElementById('drum-num').textContent='?';
  document.getElementById('drum-num').style.color='#FECA57';
  document.getElementById('drum').style.borderColor='';
  document.getElementById('drum').classList.remove('spin');
  document.getElementById('drum-lbl').textContent='Table';
  document.getElementById('rbadge').style.display='none';
  document.getElementById('btn-draw').disabled=false;
  document.getElementById('btn-txt').textContent='🎲 Tirer ma table';
  document.getElementById('complete').style.display='none';
}

/* ── RENDER ──────────────────────────────────────────────── */
function renderTables(){
  const g=document.getElementById('tgrid');
  g.innerHTML='';
  tables.forEach(t=>{
    const pct=(t.assigned/t.max)*100,full=t.assigned>=t.max,fl=flashId===t.id;
    const card=document.createElement('div');
    card.className=`t-card${full?' full':''}${fl?' flash':''}`;
    if(fl) card.style.borderColor=t.color+'55';
    card.innerHTML=`
      ${full?'<span class="t-full-badge">Plein</span>':''}
      <span class="t-id" style="color:${t.color}">${t.emoji} ${t.id}</span>
      <div class="t-prog-bg"><div class="t-prog-fill" style="width:${pct}%;background:${t.color}"></div></div>
      <span class="t-seats">${t.assigned}/${t.max}</span>`;
    g.appendChild(card);
  });
}
function updateStats(){
  const rem=tables.reduce((s,t)=>s+(t.max-t.assigned),0);
  document.getElementById('s-placed').textContent=totalCapacity-rem;
  document.getElementById('s-remain').textContent=rem;
  document.getElementById('s-active').textContent=tables.filter(t=>t.assigned<t.max).length;
}
function renderHist(){
  document.getElementById('hcnt').textContent=history.length;
  const list=document.getElementById('hist-list');
  list.innerHTML='';
  history.forEach(h=>{
    const d=document.createElement('div');
    d.className='hist-item';
    d.innerHTML=`<span style="color:${h.table.color}">${h.table.emoji} Table ${h.table.id}</span><span class="hist-num">#${h.num}</span>`;
    list.appendChild(d);
  });
}
function toggleHist(){
  showHist=!showHist;
  document.getElementById('hist-panel').style.display=showHist?'block':'none';
}

/* ── PARTICLES ───────────────────────────────────────────── */
function spawnParticles(baseColor){
  const btn=document.getElementById('btn-draw');
  const r=btn.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  const palette=[baseColor,'#FECA57','#FF6B6B','#48DBFB','#1DD1A1','#A29BFE'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='particle';
    el.style.left=(cx+(Math.random()-.5)*50)+'px';
    el.style.top=(cy+(Math.random()-.5)*50)+'px';
    el.style.background=palette[Math.floor(Math.random()*palette.length)];
    document.body.appendChild(el);
    requestAnimationFrame(()=>{
      const ang=Math.random()*Math.PI*2,dist=70+Math.random()*80;
      el.style.transform=`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist-40}px)`;
      el.style.opacity='0';
    });
    setTimeout(()=>el.remove(),1100);
  }
}

/* ── INIT ────────────────────────────────────────────────── */
rebuildCustomGrid();
syncHint();

let shareToastTimer = null;
function showShareToast(msg, duration) {
  const t = document.getElementById('share-toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(shareToastTimer);
  shareToastTimer = setTimeout(() => t.classList.remove('show'), duration || 2200);
}
document.getElementById('share-btn').addEventListener('click', async () => {
  const url = window.location.href;
  if (navigator.share) {
    try { await navigator.share({ title: 'Tirage des Tables', url }); } catch(e) {}
  } else {
    try {
      await navigator.clipboard.writeText(url);
      showShareToast('Lien copié !');
    } catch(e) { showShareToast(url, 6000); }
  }
});
</script>
</body>
